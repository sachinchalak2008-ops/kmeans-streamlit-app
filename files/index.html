<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StudyCluster — K-Means Result Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --pass: #00e5a0;
    --fail: #ff4d6d;
    --accent: #7c5cfc;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --mono: 'Space Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,92,252,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,92,252,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* --- HEADER --- */
  header {
    display: flex;
    align-items: flex-end;
    gap: 20px;
    margin-bottom: 48px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }

  .logo-mark {
    width: 48px;
    height: 48px;
    background: var(--accent);
    border-radius: 12px;
    display: grid;
    place-items: center;
    font-family: var(--display);
    font-weight: 800;
    font-size: 20px;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 0 24px rgba(124,92,252,0.4);
  }

  h1 {
    font-family: var(--display);
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 11px;
    margin-top: 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .status-pill {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 11px;
    color: var(--muted);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }

  .status-dot.online { background: var(--pass); box-shadow: 0 0 8px var(--pass); }

  /* --- GRID LAYOUT --- */
  .grid {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 20px;
  }

  .sidebar { display: flex; flex-direction: column; gap: 16px; }
  .main { display: flex; flex-direction: column; gap: 16px; }

  /* --- CARD --- */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    animation: fadeUp 0.4s ease both;
  }

  .card-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::before {
    content: '';
    width: 3px;
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* --- BUTTONS --- */
  .btn {
    width: 100%;
    padding: 11px 16px;
    border: none;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 20px rgba(124,92,252,0.3);
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(124,92,252,0.45); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { border-color: var(--accent); color: var(--text); }

  /* --- INPUTS --- */
  .input-group { margin-bottom: 14px; }
  label { display: block; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }

  input[type="number"], input[type="file"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="number"]:focus, input[type="file"]:focus {
    border-color: var(--accent);
  }

  input[type="file"] { cursor: pointer; font-size: 11px; }

  /* --- METRICS --- */
  .metrics-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }

  .metric-val {
    font-family: var(--display);
    font-weight: 800;
    font-size: 22px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .metric-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }

  /* --- PREDICT RESULT --- */
  .predict-result {
    display: none;
    align-items: center;
    gap: 14px;
    padding: 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    margin-top: 14px;
    animation: fadeUp 0.3s ease;
  }

  .predict-result.visible { display: flex; }

  .result-badge {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    display: grid;
    place-items: center;
    font-family: var(--display);
    font-weight: 800;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .result-badge.pass { background: rgba(0,229,160,0.12); color: var(--pass); border: 1px solid rgba(0,229,160,0.3); }
  .result-badge.fail { background: rgba(255,77,109,0.12); color: var(--fail); border: 1px solid rgba(255,77,109,0.3); }

  .result-info .hours { color: var(--muted); font-size: 11px; }
  .result-info .verdict { font-family: var(--display); font-weight: 700; font-size: 15px; margin-top: 2px; }
  .verdict.pass { color: var(--pass); }
  .verdict.fail { color: var(--fail); }

  /* --- TABLE --- */
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th {
    text-align: left;
    padding: 8px 12px;
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
  }
  .data-table td { padding: 9px 12px; border-bottom: 1px solid rgba(42,42,58,0.5); }
  .data-table tr:last-child td { border-bottom: none; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .badge-pass { background: rgba(0,229,160,0.12); color: var(--pass); }
  .badge-fail { background: rgba(255,77,109,0.12); color: var(--fail); }

  /* --- LOG --- */
  .log {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.8;
    max-height: 80px;
    overflow-y: auto;
  }

  .log .entry { display: flex; gap: 8px; }
  .log .ts { color: var(--accent); flex-shrink: 0; }
  .log .ok { color: var(--pass); }
  .log .err { color: var(--fail); }

  /* --- CHART --- */
  .chart-wrap { position: relative; height: 240px; }

  /* --- LOADING SPINNER --- */
  .spinner {
    display: none;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-left: 8px;
  }

  .btn.loading .spinner { display: inline-block; }
  .btn.loading .btn-text { opacity: 0.6; }

  /* --- CENTROID BADGES --- */
  .centroid-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  .centroid-card {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    text-align: center;
    border: 1px solid var(--border);
  }

  .centroid-card.pass { background: rgba(0,229,160,0.05); border-color: rgba(0,229,160,0.2); }
  .centroid-card.fail { background: rgba(255,77,109,0.05); border-color: rgba(255,77,109,0.2); }

  .centroid-card .val {
    font-family: var(--display);
    font-weight: 800;
    font-size: 20px;
    margin-bottom: 2px;
  }

  .centroid-card.pass .val { color: var(--pass); }
  .centroid-card.fail .val { color: var(--fail); }
  .centroid-card .lbl { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }

  /* --- ANIMATIONS --- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* --- RESPONSIVE --- */
  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
    .metrics-row { grid-template-columns: repeat(2, 1fr); }
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 12px;
    line-height: 2;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-mark">SC</div>
    <div>
      <h1>Study<span>Cluster</span></h1>
      <p class="subtitle">K-Means · Pass/Fail Predictor</p>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Checking…</span>
    </div>
  </header>

  <div class="grid">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <!-- Train -->
      <div class="card" style="animation-delay:0.05s">
        <div class="card-title">Train Model</div>

        <div class="input-group">
          <label>Upload CSV (optional)</label>
          <input type="file" id="csvFile" accept=".csv" />
        </div>

        <button class="btn btn-primary" id="trainBtn" onclick="trainModel()">
          <span class="btn-text">Train on Sample Data</span>
          <span class="spinner"></span>
        </button>
        <div style="margin-top:8px">
          <button class="btn btn-ghost" onclick="trainFromUpload()">Upload & Train CSV</button>
        </div>
      </div>

      <!-- Predict -->
      <div class="card" style="animation-delay:0.1s">
        <div class="card-title">Predict</div>
        <div class="input-group">
          <label>Study Hours</label>
          <input type="number" id="hoursInput" placeholder="e.g. 4.5" step="0.5" min="0" max="24" />
        </div>
        <button class="btn btn-primary" onclick="predict()">Run Prediction</button>

        <div class="predict-result" id="predictResult">
          <div class="result-badge" id="resultBadge"></div>
          <div class="result-info">
            <div class="hours" id="resultHours"></div>
            <div class="verdict" id="resultVerdict"></div>
          </div>
        </div>
      </div>

      <!-- Centroids -->
      <div class="card" style="animation-delay:0.15s">
        <div class="card-title">Cluster Centroids</div>
        <div id="centroidsSection">
          <div class="empty">Train the model to see centroids</div>
        </div>
      </div>

      <!-- Log -->
      <div class="card" style="animation-delay:0.2s">
        <div class="card-title">Activity Log</div>
        <div class="log" id="logBox"></div>
      </div>

    </div>

    <!-- MAIN -->
    <div class="main">

      <!-- Metrics -->
      <div class="card" style="animation-delay:0.1s">
        <div class="card-title">Model Metrics</div>
        <div class="metrics-row">
          <div class="metric">
            <div class="metric-val" id="metricPass" style="color:var(--pass)">—</div>
            <div class="metric-label">Pass Students</div>
          </div>
          <div class="metric">
            <div class="metric-val" id="metricFail" style="color:var(--fail)">—</div>
            <div class="metric-label">Fail Students</div>
          </div>
          <div class="metric">
            <div class="metric-val" id="metricInertia" style="color:var(--accent)">—</div>
            <div class="metric-label">Inertia</div>
          </div>
        </div>
      </div>

      <!-- Chart -->
      <div class="card" style="animation-delay:0.15s">
        <div class="card-title">Cluster Visualization</div>
        <div class="chart-wrap">
          <canvas id="clusterChart"></canvas>
        </div>
      </div>

      <!-- Data Table -->
      <div class="card" style="animation-delay:0.2s">
        <div class="card-title">Training Data</div>
        <div id="tableWrap">
          <div class="empty">No training data yet.<br>Train the model to populate this table.</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
let chart = null;

// ── LOG ──────────────────────────────────────────────
function log(msg, type = 'ok') {
  const box = document.getElementById('logBox');
  const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
  const entry = document.createElement('div');
  entry.className = 'entry';
  entry.innerHTML = `<span class="ts">[${ts}]</span><span class="${type}">${msg}</span>`;
  box.prepend(entry);
}

// ── HEALTH ───────────────────────────────────────────
async function checkHealth() {
  try {
    const res = await fetch(`${API}/health`);
    const data = await res.json();
    document.getElementById('statusDot').className = 'status-dot online';
    document.getElementById('statusText').textContent = data.model_trained ? 'Model ready' : 'Server online';
    log('Backend connected', 'ok');
  } catch {
    document.getElementById('statusText').textContent = 'Server offline';
    log('Cannot reach backend — start uvicorn first', 'err');
  }
}

// ── TRAIN (sample data) ──────────────────────────────
async function trainModel() {
  const btn = document.getElementById('trainBtn');
  btn.classList.add('loading');
  btn.disabled = true;
  try {
    const res = await fetch(`${API}/train`, { method: 'POST' });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    log(`Trained on ${data.n_samples} samples`, 'ok');
    renderResults(data);
    document.getElementById('statusDot').className = 'status-dot online';
    document.getElementById('statusText').textContent = 'Model ready';
  } catch (e) {
    log(`Train failed: ${e.message}`, 'err');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// ── TRAIN (upload) ───────────────────────────────────
async function trainFromUpload() {
  const fileInput = document.getElementById('csvFile');
  if (!fileInput.files.length) {
    log('No CSV selected', 'err');
    return;
  }
  const formData = new FormData();
  formData.append('file', fileInput.files[0]);
  try {
    const res = await fetch(`${API}/train/upload`, { method: 'POST', body: formData });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    log(`Uploaded & trained on ${data.n_samples} samples`, 'ok');
    renderResults(data);
  } catch (e) {
    log(`Upload train failed: ${e.message}`, 'err');
  }
}

// ── PREDICT ──────────────────────────────────────────
async function predict() {
  const h = parseFloat(document.getElementById('hoursInput').value);
  if (isNaN(h) || h < 0) { log('Enter valid study hours', 'err'); return; }

  try {
    const res = await fetch(`${API}/predict`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ study_hours: h }),
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    const resultEl = document.getElementById('predictResult');
    const badge = document.getElementById('resultBadge');
    const hoursEl = document.getElementById('resultHours');
    const verdictEl = document.getElementById('resultVerdict');

    badge.className = `result-badge ${data.prediction}`;
    badge.textContent = data.prediction.toUpperCase();
    hoursEl.textContent = `${h} study hours → Cluster ${data.cluster}`;
    verdictEl.className = `verdict ${data.prediction}`;
    verdictEl.textContent = data.prediction === 'pass' ? '✓ Predicted to PASS' : '✗ Predicted to FAIL';

    resultEl.classList.add('visible');
    log(`Predict(${h}h) → ${data.prediction.toUpperCase()}`, 'ok');

    // Add prediction marker to chart if chart exists
    if (chart) {
      const color = data.prediction === 'pass' ? '#00e5a0' : '#ff4d6d';
      chart.data.datasets.push({
        label: `⬟ Prediction (${h}h)`,
        data: [{ x: h, y: 0.5 }],
        backgroundColor: color,
        borderColor: '#fff',
        borderWidth: 2,
        pointRadius: 10,
        pointStyle: 'rectRot',
        showLine: false,
      });
      chart.update();
    }
  } catch (e) {
    log(`Predict failed: ${e.message}`, 'err');
  }
}

// ── RENDER RESULTS ───────────────────────────────────
function renderResults(data) {
  const training = data.training_data;
  const passCount = training.filter(d => d.label === 'pass').length;
  const failCount = training.filter(d => d.label === 'fail').length;

  document.getElementById('metricPass').textContent = passCount;
  document.getElementById('metricFail').textContent = failCount;
  document.getElementById('metricInertia').textContent = data.inertia?.toFixed(2) ?? '—';

  renderChart(training);
  renderTable(training);
  renderCentroids(data.centroids);
}

// ── CHART ─────────────────────────────────────────────
function renderChart(training) {
  const passPoints = training.filter(d => d.label === 'pass').map(d => ({ x: d.study_hours, y: 1 }));
  const failPoints = training.filter(d => d.label === 'fail').map(d => ({ x: d.study_hours, y: 0 }));

  const ctx = document.getElementById('clusterChart').getContext('2d');
  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'scatter',
    data: {
      datasets: [
        {
          label: 'Pass',
          data: passPoints,
          backgroundColor: 'rgba(0,229,160,0.7)',
          borderColor: '#00e5a0',
          borderWidth: 1.5,
          pointRadius: 9,
        },
        {
          label: 'Fail',
          data: failPoints,
          backgroundColor: 'rgba(255,77,109,0.7)',
          borderColor: '#ff4d6d',
          borderWidth: 1.5,
          pointRadius: 9,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: {
            color: '#6b6b80',
            font: { family: "'Space Mono', monospace", size: 11 },
            boxWidth: 12,
          },
        },
        tooltip: {
          callbacks: {
            label: ctx => {
              const d = ctx.raw;
              return `${ctx.dataset.label}: ${d.x} study hours`;
            },
          },
          backgroundColor: '#16161f',
          borderColor: '#2a2a3a',
          borderWidth: 1,
          titleColor: '#e8e8f0',
          bodyColor: '#6b6b80',
          titleFont: { family: "'Syne', sans-serif", weight: '700' },
          bodyFont: { family: "'Space Mono', monospace" },
        },
      },
      scales: {
        x: {
          title: {
            display: true,
            text: 'Study Hours',
            color: '#6b6b80',
            font: { family: "'Space Mono', monospace", size: 11 },
          },
          grid: { color: 'rgba(42,42,58,0.5)' },
          ticks: { color: '#6b6b80', font: { family: "'Space Mono', monospace", size: 10 } },
        },
        y: {
          title: {
            display: true,
            text: 'Cluster (0=Fail / 1=Pass)',
            color: '#6b6b80',
            font: { family: "'Space Mono', monospace", size: 11 },
          },
          grid: { color: 'rgba(42,42,58,0.5)' },
          ticks: {
            color: '#6b6b80',
            font: { family: "'Space Mono', monospace", size: 10 },
            stepSize: 1,
            callback: v => v === 0 ? 'Fail' : v === 1 ? 'Pass' : '',
          },
          min: -0.3,
          max: 1.3,
        },
      },
    },
  });
}

// ── TABLE ────────────────────────────────────────────
function renderTable(training) {
  const wrap = document.getElementById('tableWrap');
  let html = `<table class="data-table">
    <thead><tr>
      <th>#</th>
      <th>Study Hours</th>
      <th>Cluster</th>
      <th>Predicted</th>
      <th>Actual</th>
    </tr></thead><tbody>`;

  training.forEach((row, i) => {
    const cls = row.label === 'pass' ? 'badge-pass' : 'badge-fail';
    const actual = row.actual
      ? `<span class="badge ${row.actual === 'pass' ? 'badge-pass' : 'badge-fail'}">${row.actual}</span>`
      : '<span style="color:var(--muted)">—</span>';
    html += `<tr>
      <td style="color:var(--muted)">${i + 1}</td>
      <td>${row.study_hours}h</td>
      <td style="color:var(--muted)">${row.cluster}</td>
      <td><span class="badge ${cls}">${row.label}</span></td>
      <td>${actual}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

// ── CENTROIDS ─────────────────────────────────────────
function renderCentroids(centroids) {
  const section = document.getElementById('centroidsSection');
  const rows = centroids.map(c => `
    <div class="centroid-card ${c.label}">
      <div class="val">${c.centroid.toFixed(1)}h</div>
      <div class="lbl">Cluster ${c.cluster} · ${c.label.toUpperCase()}</div>
    </div>
  `).join('');
  section.innerHTML = `<div class="centroid-row">${rows}</div>`;
}

// ── INIT ─────────────────────────────────────────────
checkHealth();
</script>
